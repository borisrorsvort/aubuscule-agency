name: PR Preview

# Builds the PR branch and deploys an isolated Cloudflare Worker per PR
# with a stable URL (https://pr-<n>-aubuscule.workers.dev).
# Each PR gets its own worker — production is never touched.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Avoid piling up runs on rapid pushes.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # sharp is unused (images are `unoptimized`); skip its native build.
      - run: npm ci --ignore-scripts

      - run: npx opennextjs-cloudflare build

      - name: Generate preview wrangler config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('wrangler.jsonc', 'utf8');
            const clean = src.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//gm, '');
            const cfg = JSON.parse(clean);
            delete cfg.routes;
            cfg.name = 'pr-' + process.env.PR + '-aubuscule';
            cfg.account_id = process.env.CLOUDFLARE_ACCOUNT_ID;
            fs.writeFileSync('wrangler.preview.json', JSON.stringify(cfg, null, 2));
          "
          cat wrangler.preview.json

      - name: Verify Cloudflare auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler whoami 2>&1 || true

      - name: Deploy preview worker
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          out=$(npx wrangler deploy --config wrangler.preview.json 2>&1) || {
            echo "::group::Wrangler output (failed)"
            echo "$out"
            echo "::endgroup::"
            exit 1
          }
          echo "::group::Wrangler output"
          echo "$out"
          echo "::endgroup::"
          url=$(echo "$out" | grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -n1)
          if [ -z "$url" ]; then
            url="https://pr-${PR}-aubuscule.workers.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          URL: ${{ steps.preview.outputs.url }}
          PR: ${{ github.event.pull_request.number }}
        with:
          script: |
            const url = process.env.URL;
            const pr = Number(process.env.PR);
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n🧪 **Preview deployment**\n\n` +
              (url
                ? `\`pr-${pr}\` → ${url}\n\nTry: [\`/\`](${url}/) · [\`/agency\`](${url}/agency) · [\`/apps\`](${url}/apps) · [\`/blog\`](${url}/blog) · [\`/dev\`](${url}/dev)`
                : '⚠️ Preview URL not found in the build output — check the workflow logs.');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body,
              });
            }
