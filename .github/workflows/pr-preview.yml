name: PR Preview

# Builds the PR branch and uploads an isolated Cloudflare Workers preview
# version with a stable, PR-numbered URL (https://pr-<n>-aubuscule.<sub>.workers.dev).
# `versions upload` does NOT deploy to production or touch custom domains.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Avoid piling up runs on rapid pushes.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # sharp is unused (images are `unoptimized`); skip its native build.
      - run: npm ci --ignore-scripts

      - run: npx opennextjs-cloudflare build

      - name: Upload preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          out=$(npx wrangler versions upload --preview-alias "pr-${PR}" 2>&1)
          echo "$out"
          # Preview-alias URL is deterministic: https://pr-<n>-<worker>.<sub>.workers.dev
          url=$(echo "$out" | grep -oE "https://pr-${PR}-[a-z0-9.-]+\.workers\.dev" | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          URL: ${{ steps.preview.outputs.url }}
          PR: ${{ github.event.pull_request.number }}
        with:
          script: |
            const url = process.env.URL;
            const pr = Number(process.env.PR);
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n🧪 **Preview deployment**\n\n` +
              (url
                ? `\`pr-${pr}\` → ${url}\n\nTry: [\`/\`](${url}/) · [\`/agency\`](${url}/agency) · [\`/apps\`](${url}/apps) · [\`/blog\`](${url}/blog) · [\`/dev\`](${url}/dev)`
                : '⚠️ Preview URL not found in the build output — check the workflow logs.');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body,
              });
            }
